openapi: 3.0.3
info:
  title: Partner Integration API
  version: 1.0.0
  description: Partner-facing APIs for order intake, status, shipments, settlements, reports, and webhooks.
x-ibm-name: partner-integration-api
servers:
  - url: https://YOUR_APIC_GATEWAY_HOST
security:
  - oauth2ClientCredentials: []
x-ibm-configuration:
  type: rest
  phase: realized
  enforced: true
  testable: true
  gateway: datapower-api-gateway
  properties:
    backend-url:
      value: https://backend.example.com
      description: Backend base URL for partner domain service.
      encoded: false
  assembly:
    execute:
      - invoke:
          title: invoke-backend
          version: 2.0.0
          verb: keep
          timeout: 60
          target-url: $(backend-url)
  activity-log:
    success-content: activity
    error-content: payload
paths:
  /v1/partners/{partnerId}/orders:
    get:
      summary: List partner orders
      operationId: listPartnerOrders
      security:
        - oauth2ClientCredentials:
            - orders:read
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [created, accepted, shipped, canceled]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Orders returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Create a partner order
      operationId: createPartnerOrder
      security:
        - oauth2ClientCredentials:
            - orders:write
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/orders/{orderId}:
    get:
      summary: Get partner order by id
      operationId: getPartnerOrder
      security:
        - oauth2ClientCredentials:
            - orders:read
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/shipments:
    post:
      summary: Create a shipment for a partner order
      operationId: createPartnerShipment
      security:
        - oauth2ClientCredentials:
            - shipments:write
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '201':
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/settlements:
    get:
      summary: Get partner settlements for a month
      operationId: getPartnerSettlements
      security:
        - oauth2ClientCredentials:
            - settlements:read
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: '^\\d{4}-(0[1-9]|1[0-2])$'
            example: '2026-02'
      responses:
        '200':
          description: Settlement list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/reports/sales:
    get:
      summary: Get sales report by date range
      operationId: getPartnerSalesReport
      security:
        - oauth2ClientCredentials:
            - reports:read
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        '200':
          description: Sales report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/webhooks:
    get:
      summary: List partner webhooks
      operationId: listPartnerWebhooks
      security:
        - oauth2ClientCredentials:
            - webhooks:read
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
      responses:
        '200':
          description: Webhook list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      summary: Register partner webhook
      operationId: createPartnerWebhook
      security:
        - oauth2ClientCredentials:
            - webhooks:write
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v1/partners/{partnerId}/webhooks/{webhookId}/test:
    post:
      summary: Trigger a webhook test delivery
      operationId: testPartnerWebhook
      security:
        - oauth2ClientCredentials:
            - webhooks:write
      parameters:
        - $ref: '#/components/parameters/PartnerIdPath'
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Webhook test accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    oauth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth2/token
          scopes:
            orders:read: Read partner orders.
            orders:write: Create partner orders.
            shipments:write: Create shipments.
            settlements:read: Read settlement data.
            reports:read: Read reporting data.
            webhooks:read: Read webhook registrations.
            webhooks:write: Create webhook registrations and test deliveries.
  parameters:
    PartnerIdPath:
      name: partnerId
      in: path
      required: true
      schema:
        type: string
    PartnerIdHeader:
      name: X-Partner-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    CreateOrderRequest:
      type: object
      required: [externalOrderId, currency, items]
      properties:
        externalOrderId:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, quantity, unitPrice]
            properties:
              sku:
                type: string
              quantity:
                type: integer
                minimum: 1
              unitPrice:
                type: number
                format: double
    OrderResponse:
      type: object
      required: [orderId, partnerId, status, createdAt]
      properties:
        orderId:
          type: string
        partnerId:
          type: string
        externalOrderId:
          type: string
        status:
          type: string
          enum: [created, accepted, shipped, canceled]
        totalAmount:
          type: number
          format: double
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
    OrderListResponse:
      type: object
      required: [page, pageSize, total, orders]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
    CreateShipmentRequest:
      type: object
      required: [orderId, carrier, trackingNumber]
      properties:
        orderId:
          type: string
        carrier:
          type: string
        trackingNumber:
          type: string
        shippedAt:
          type: string
          format: date-time
    ShipmentResponse:
      type: object
      required: [shipmentId, partnerId, orderId, status]
      properties:
        shipmentId:
          type: string
        partnerId:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum: [created, in_transit, delivered]
        createdAt:
          type: string
          format: date-time
    SettlementListResponse:
      type: object
      required: [month, settlements]
      properties:
        month:
          type: string
        settlements:
          type: array
          items:
            type: object
            required: [settlementId, amount, currency, paidAt]
            properties:
              settlementId:
                type: string
              amount:
                type: number
                format: double
              currency:
                type: string
              paidAt:
                type: string
                format: date-time
    SalesReportResponse:
      type: object
      required: [from, to, groupBy, rows]
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        groupBy:
          type: string
        rows:
          type: array
          items:
            type: object
            required: [period, orderCount, grossAmount, currency]
            properties:
              period:
                type: string
              orderCount:
                type: integer
              grossAmount:
                type: number
                format: double
              currency:
                type: string
    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          minItems: 1
          items:
            type: string
            enum: [order.created, order.shipped, settlement.paid]
    WebhookResponse:
      type: object
      required: [webhookId, partnerId, url, events, status, createdAt]
      properties:
        webhookId:
          type: string
        partnerId:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
    WebhookListResponse:
      type: object
      required: [webhooks]
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
    WebhookTestResponse:
      type: object
      required: [webhookId, deliveryId, status]
      properties:
        webhookId:
          type: string
        deliveryId:
          type: string
        status:
          type: string
          enum: [accepted]
    ErrorResponse:
      type: object
      required: [code, message, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
